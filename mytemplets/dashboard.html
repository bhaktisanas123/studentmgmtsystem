<!DOCTYPE html>

<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='dashboard.css') }}">

</head>

<body> 

  

    <h1>Student Management Dashboard</h1>

    <div class="button-container">

        <a href="/addstudent">

            <button>
                Add Student
            </button>

        </a>

        <a href="/students">

            <button>
                View Students
            </button>

        </a>

        <a href="/logout">

            <button class="logout-btn">
                Logout
            </button>

        </a>

    </div>

    <div class="card-container">

        <div class="card">

            <h2>Total Students</h2>

            <p>{{ total_students }}</p>

        </div>

        <div class="card">

            <h2>Total Courses</h2>

            <p>{{ total_courses }}</p>

        </div>

        <div class="card">

            <h2>Total Departments</h2>

            <p>{{ total_departments }}</p>

        </div>

    </div> 

    <footer>

    Developed by Bhakti Sanas 🚀

</footer>

</body>

</html>
