<html>
    <head>
        <title>
            addstudent page
        </title>
        <link rel="stylesheet"
       href="{{ url_for('static', filename='addstudent.css') }}">
    </head>
    <body>
        <h1>the student information form</h1>
        {% with messages = get_flashed_messages() %}

    {% if messages %}

        {% for message in messages %}

            <div class="flash-message">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

{% endwith %}
        <form method="POST">
            <input type="text" name="fullname" placeholder="enter student full name"><br>
            <input type="text" name="rollno" placeholder="enter student roll no "><br>
            <input type="text" name="phno" placeholder="enter student phone number "><br>
            <input type="text" name="addr" placeholder="enter student addr"><br>
            <input type="date" name="dob" placeholder="enter student birth date "><br>
            <input type="text" name="age" placeholder="enter student age "><br>
            <input type="text" name="gender" placeholder="enter student gender "><br>
            <input type="text" name="year" placeholder="enter student year "><br>
            <input type="text" name="cou" placeholder="enter student course "><br>
            <input type="text" name="department" placeholder="enter student department "><br>
            <input type="date" name="addmission" placeholder="enter student addmission date "><br>
            <input type="submit" value="submit">

        </form>
    </body>
</html>
