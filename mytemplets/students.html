<!DOCTYPE html>

<html>

<head>

    <title>View Students</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='students.css') }}">

</head>

<body>

    <h1>Student Records</h1>

    <form method="GET" class="search-form">

        <input
            type="text"
            name="rollno"
            placeholder="Search by Roll Number">

        <button type="submit">
            Search
        </button>

    </form>

    <table>

        <tr>

            <th>ID</th>

            <th>Roll No</th>

            <th>Full Name</th>

            <th>Age</th>

            <th>Phone</th>

            <th>Course</th>

            <th>Department</th>

            <th>Year</th>

            <th>Email</th>

            <th>Edit</th>

            <th>Delete</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>

            <td>{{ student[1] }}</td>

            <td>{{ student[2] }}</td>

            <td>{{ student[3] }}</td>

            <td>{{ student[4] }}</td>

            <td>{{ student[8] }}</td>

            <td>{{ student[9] }}</td>

            <td>{{ student[10] }}</td>

            <td>{{ student[11] }}</td>

            <!-- Edit Button -->

            <td>

                <a href="/edit/{{ student[1] }}">

                    <button class="edit-btn">
                        Edit
                    </button>

                </a>

            </td>

            <!-- Delete Button -->

            <td>

                <a href="/delete/{{ student[1] }}">

                    <button class="delete-btn">
                        Delete
                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
